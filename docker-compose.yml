services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: padel-tours-postgres
    environment:
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
      POSTGRES_DB: padel_tours
    ports:
      - "5433:5432"
    volumes:
      - padel-tours-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padel_tours"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  padel-tours-pgdata:
